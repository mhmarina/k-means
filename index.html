<!DOCTYPE html>
<head>
    <script src="https://cdn.jsdelivr.net/gh/nastyox/Rando.js@master/code/plain-javascript/2.0.0/rando-min.js"></script>
    <script src="points.js"></script>
    <script src="soft_clustering.js"></script>
    <script src="hard_clustering.js"></script>
    <script src="common_utils.js"></script>
</head>
<body>
    <svg width="100%" height="75vh" id="main-svg" style="background-color: rgb(36, 36, 36)"></svg>
    <div>
        <input type="radio" id="hard" name="cluster-type" value="hard" checked />
        <label for="hard">hard clustering</label>
        <input type="radio" id="soft" name="cluster-type" value="soft" />
        <label for="soft">soft clustering</label>
    </div>
    <div>
        <input type="range" id="k" name="k" min="2" max="5" step="1" value="2"/>
        <label id="k-label" for="k">k: 2</label>
    </div>
    <div>
        <input type="range" id="stiffness" name="stiffness" min="0" max="1" step="0.01" value="0.5"/>
        <label id="stiffness-label" for="stiffness">stiffness: 0.5</label>
    </div>
</body>
